<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pylon Holdings</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #fff; color: #111; font-size: 13px; }

    /* ── HEADER ── */
    header {
      padding: 24px 32px 18px;
      border-bottom: 2px solid #111;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-left h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; margin-bottom: 12px; }
    .aum-strip { display: flex; gap: 28px; align-items: baseline; flex-wrap: wrap; }
    .aum-block {}
    .aum-value        { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; line-height: 1; }
    .aum-value.small  { font-size: 16px; font-weight: 600; }
    .aum-label        { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #999; margin-top: 3px; }
    .aum-div          { width: 1px; height: 28px; background: #e5e5e5; align-self: center; }

    .header-right { text-align: right; }
    .refresh-status { font-size: 11px; color: #999; margin-bottom: 6px; }
    .refresh-status span { color: #333; font-weight: 600; }
    .refresh-btn {
      background: none; border: 1px solid #ddd; padding: 4px 14px;
      font-size: 11px; font-family: Arial; cursor: pointer; color: #666;
    }
    .refresh-btn:hover { border-color: #111; color: #111; }

    /* ── CATEGORY BAR ── */
    .cat-bar-section {
      padding: 14px 32px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .cat-bar-track {
      flex: 1;
      min-width: 200px;
      height: 8px;
      background: #f0f0f0;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
    }
    .cat-bar-seg { height: 100%; transition: width 0.4s ease; }
    .cat-legend { display: flex; gap: 18px; flex-wrap: wrap; }
    .cat-item { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .cat-name { font-size: 11px; color: #555; }
    .cat-val  { font-size: 11px; font-weight: 700; color: #111; margin-left: 2px; }
    .cat-pct  { font-size: 10px; color: #999; }

    /* ── MAIN GRID ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 360px;
    }

    /* ── TABLE SECTION ── */
    .table-section { padding: 20px 32px 32px; border-right: 1px solid #e5e5e5; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.9px; color: #999; margin-bottom: 0;
    }
    .toggle-btn {
      font-family: Arial; font-size: 10px; font-weight: 600;
      padding: 3px 10px; border: 1px solid #ddd; background: #fff;
      color: #666; cursor: pointer; letter-spacing: 0.3px;
      transition: all 0.15s;
    }
    .toggle-btn:hover { border-color: #999; color: #333; }
    .toggle-btn.active { border-color: #1a7a3a; color: #1a7a3a; background: #f0faf3; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: #999; padding: 0 8px 10px 0;
      border-bottom: 1px solid #ddd; text-align: right; cursor: pointer;
      user-select: none; white-space: nowrap;
    }
    thead th:first-child { text-align: left; padding-left: 0; }
    thead th:hover, thead th.sorted { color: #111; }
    .sort-arrow { margin-left: 2px; opacity: 0.4; }
    thead th.sorted .sort-arrow { opacity: 1; }

    tbody td {
      padding: 10px 8px 10px 0; border-bottom: 1px solid #f2f2f2;
      text-align: right; font-variant-numeric: tabular-nums; vertical-align: middle;
    }
    tbody td:first-child { text-align: left; padding-left: 0; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafafa; }
    .tok-name { font-weight: 600; }
    .tok-cat  { font-size: 10px; color: #999; font-weight: 400; margin-left: 5px; }
    .null-val { color: #ccc; }
    .pct-val  { color: #555; }
    .alloc-cell { position: relative; }
    .alloc-bar  {
      position: absolute; bottom: 0; right: 0;
      height: 2px; background: #1a7a3a; border-radius: 1px;
    }

    /* ── RIGHT PANEL ── */
    .right-panel { padding: 20px 24px 32px; display: flex; flex-direction: column; gap: 28px; }
    .chart-block {}
    .chart-block canvas { display: block; }

    /* ── SECTOR SECTION ── */
    .sector-section {
      padding: 20px 32px 32px;
      border-top: 1px solid #e5e5e5;
    }
    .sector-layout {
      display: flex;
      align-items: flex-start;
      gap: 48px;
      flex-wrap: wrap;
    }
    .sector-breakdown-table { min-width: 260px; padding-top: 4px; }
    .sector-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #f2f2f2;
    }
    .sector-row:last-child { border-bottom: none; }
    .sector-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sector-name { font-size: 12px; font-weight: 600; flex: 1; }
    .sector-val  { font-size: 12px; font-variant-numeric: tabular-nums; color: #111; }
    .sector-pct  { font-size: 11px; color: #999; width: 48px; text-align: right; }
    .sector-note { font-size: 11px; color: #bbb; margin-top: 16px; font-style: italic; }

    /* ── HISTORY SECTION ── */
    .history-section {
      padding: 28px 32px 40px;
      border-top: 1px solid #e5e5e5;
    }
    .history-note { font-size: 11px; color: #bbb; margin-top: 8px; font-style: italic; }

    /* ── CALL OPTIONS SECTION ── */
    .call-options-section {
      padding: 20px 32px 40px;
      border-top: 1px solid #e5e5e5;
    }
    /* ── CALL OPTIONS TRANSPOSED TABLE ── */
    .options-table { width: 100%; border-collapse: collapse; margin-top: 4px; max-width: 760px; }
    .options-table thead th {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: #999; padding: 0 0 10px 20px;
      border-bottom: 2px solid #111; text-align: right; white-space: nowrap;
    }
    .options-table thead th.opt-col-itm {
      color: #1a7a3a; border-bottom-color: #1a7a3a;
    }
    .options-table thead th:first-child { text-align: left; padding-left: 0; border-bottom-color: #ddd; }
    .options-table tbody tr { border-bottom: 1px solid #f2f2f2; }
    .options-table tbody tr:last-child { border-bottom: none; }
    .options-table tbody tr.opt-divider td { border-bottom: 1px solid #e5e5e5; padding-top: 0; padding-bottom: 0; height: 6px; }
    .options-table tbody td {
      padding: 9px 0 9px 20px;
      text-align: right; font-variant-numeric: tabular-nums; font-size: 13px;
    }
    .options-table tbody td:first-child {
      text-align: left; padding-left: 0;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: #aaa; white-space: nowrap;
    }
    .options-table tbody tr:hover td { background: #fafafa; }
    .options-table tbody tr:hover td:first-child { background: none; }
    .opt-itm { color: #1a7a3a; font-weight: 700; }
    .opt-otm { color: #c0392b; font-weight: 600; }
    .opt-payoff-pos { color: #1a7a3a; font-weight: 700; }
    .opt-payoff-neg { color: #c0392b; font-weight: 600; }
    .opt-delivery-cell { font-size: 11px; color: #777; text-align: right; line-height: 1.5; max-width: 200px; }

    /* ── LOADING / ERROR ── */
    .loading { color: #999; font-size: 12px; padding: 20px 0; }
    .error   { color: #c0392b; font-size: 12px; padding: 12px 0; }

    /* ── MOBILE ── */
    @media (max-width: 760px) {
      header { padding: 18px 18px 14px; }
      .cat-bar-section { padding: 12px 18px; }

      .main-grid { grid-template-columns: 1fr; }
      .table-section { padding: 18px 18px 24px; border-right: none; border-bottom: 1px solid #e5e5e5; }
      .right-panel { padding: 18px 18px 24px; flex-direction: row; flex-wrap: wrap; gap: 18px; }
      .right-panel .chart-block { flex: 1 1 280px; min-width: 0; }
      .right-panel canvas { width: 100% !important; height: auto !important; }
      .sector-section { padding: 18px 18px 24px; }
      .history-section { padding: 18px 18px 24px; }
      .call-options-section { padding: 18px 18px 28px; }
      .options-table { font-size: 11px; }
      .opt-delivery { max-width: 120px; }
      .aum-value { font-size: 22px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <h1>Pylon Holdings</h1>
    <div class="aum-strip">
      <div class="aum-block">
        <div class="aum-value" id="total-aum">—</div>
        <div class="aum-label">Total AUM</div>
      </div>
      <div class="aum-div"></div>
      <div class="aum-block">
        <div class="aum-value small" id="personal-aum">—</div>
        <div class="aum-label">Personal</div>
      </div>
      <div class="aum-block">
        <div class="aum-value small" id="pylon-aum">—</div>
        <div class="aum-label">Pylon</div>
      </div>
    </div>
  </div>
  <div class="header-right">
    <div class="refresh-status">Refreshes in <span id="countdown">5:00</span></div>
    <button class="refresh-btn" onclick="manualRefresh()">Refresh now</button>
  </div>
</header>

<!-- CATEGORY BAR -->
<div class="cat-bar-section">
  <div class="cat-bar-track" id="cat-bar">
    <div class="cat-bar-seg" id="seg-crypto" style="background:#1a7a3a; width:0%"></div>
    <div class="cat-bar-seg" id="seg-stables" style="background:#999; width:0%"></div>
    <div class="cat-bar-seg" id="seg-illiquid" style="background:#d4a017; width:0%"></div>
  </div>
  <div class="cat-legend" id="cat-legend">
    <div class="cat-item">
      <div class="cat-dot" style="background:#1a7a3a"></div>
      <span class="cat-name">Crypto</span>
      <span class="cat-val" id="cat-crypto-val">—</span>
      <span class="cat-pct" id="cat-crypto-pct"></span>
    </div>
    <div class="cat-item">
      <div class="cat-dot" style="background:#999"></div>
      <span class="cat-name">Stables</span>
      <span class="cat-val" id="cat-stables-val">—</span>
      <span class="cat-pct" id="cat-stables-pct"></span>
    </div>
    <div class="cat-item">
      <div class="cat-dot" style="background:#d4a017"></div>
      <span class="cat-name">Illiquid</span>
      <span class="cat-val" id="cat-illiquid-val">—</span>
      <span class="cat-pct" id="cat-illiquid-pct"></span>
    </div>
  </div>
</div>

<!-- MAIN GRID -->
<div class="main-grid">

  <!-- Holdings table -->
  <div class="table-section">
    <div class="section-header">
      <div class="section-label">Holdings</div>
      <button class="toggle-btn" id="dust-btn" onclick="toggleDust()">Hide dust</button>
    </div>
    <div id="table-container"><div class="loading">Loading...</div></div>
  </div>

  <!-- Right charts -->
  <div class="right-panel">
    <div class="chart-block">
      <div class="section-label">Allocation</div>
      <canvas id="donut-chart" width="312" height="220"></canvas>
    </div>
    <div class="chart-block">
      <div class="section-label">Personal vs Pylon</div>
      <canvas id="split-chart" width="312" height="280"></canvas>
    </div>
  </div>

</div>

<!-- SECTOR ANALYSIS -->
<div class="sector-section">
  <div class="section-label">Sector Analysis</div>
  <div class="sector-layout">
    <canvas id="sector-chart" width="260" height="200"></canvas>
    <div class="sector-breakdown-table" id="sector-breakdown"><div class="loading">Loading...</div></div>
  </div>
</div>

<!-- HISTORY LINE -->
<div class="history-section">
  <div class="section-header">
    <div class="section-label">Portfolio Value Over Time</div>
    <button class="toggle-btn" id="btc-btn" onclick="toggleBTC()">BTC overlay</button>
  </div>
  <div id="history-container"><div class="loading">Loading...</div></div>
</div>

<!-- CALL OPTIONS -->
<div class="call-options-section">
  <div class="section-label">Call Options</div>
  <div id="call-options-container"><div class="loading">Loading...</div></div>
</div>

<script>
  const SHEET_ID   = '1CzdYeJkbu33l7jd0k8zBU63_QzYAAY_wIuM3r69ZpYQ';
  const SHEET_NAME = 'Consolidated';
  const GVIZ_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
  const REFRESH_MS = 5 * 60 * 1000;

  // ── Historical AUM snapshots (hardcoded) ─────────────────────
  // Format: [display label, portfolio value, ISO sort date, BTC price, HYPE price]
  const HARDCODED_HISTORY = [
    ["Jul '23",      60994, '2023-07-25',  29200,   null],
    ["Nov '24",      90768, '2024-11-13',  88265,   null],
    ["Dec '24",     177437, '2024-12-14', 101352,  19.45],
    ["Jan '25",     360435, '2025-01-17', 100045,  23.57],
    ["Feb '25",     259259, '2025-02-15',  97488,  26.22],
    ["Mar '25",     253691, '2025-03-15',  83972,  13.75],
    ["Apr '25",     293853, '2025-04-11',  79596,  14.34],
    ["May '25",     383398, '2025-05-11', 104631,  26.09],
    ["Jun '25",     400853, '2025-06-11', 110213,  42.14],
    ["Jul '25",     426194, '2025-07-12', 117571,  46.18],
    ["Aug '25",     456043, '2025-08-14', 123561,  47.73],
    ["Sep '25",     567147, '2025-09-21', 115716,  54.11],
    ["Oct '25",     471797, '2025-10-18', 106444,  35.38],
    ["Dec 3 '25",   423981, '2025-12-03',  91345,  33.89],
    ["Dec 14 '25",  395337, '2025-12-14',  90257,  29.59],
    ["Jan '26",     414684, '2026-01-15',  97008,  25.92],
    ["Mar '26",     332136, '2026-03-07',  68148,  31.16],
  ];

  // BTC + HYPE prices for sheet-derived history entries (keyed by ISO date)
  const BTC_BY_DATE  = { '2026-05-14': 79278,  '2026-05-15': 81052  };
  const HYPE_BY_DATE = { '2026-05-14': 38.88,  '2026-05-15': 44.12  };

  // Chart events (annotated on history chart)
  const CHART_EVENTS = [
    { date: '2026-05-04', label: 'SN44 exercise', color: '#1a7a3a' },
  ];

  // Try to parse a sheet history label into an ISO date for sorting
  function parseHistLabel(label) {
    const MONTHS = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
    // "Mon DD YYYY" e.g. "May 14 2026"
    let m = String(label).match(/^(\w{3})\s+(\d{1,2})\s+(\d{4})$/);
    if (m) return `${m[3]}-${String(MONTHS[m[1]]||1).padStart(2,'0')}-${m[2].padStart(2,'0')}`;
    // "Mon DD" (no year — assume 2026)
    m = String(label).match(/^(\w{3})\s+(\d{1,2})$/);
    if (m) return `2026-${String(MONTHS[m[1]]||1).padStart(2,'0')}-${m[2].padStart(2,'0')}`;
    // "Mon 'YY"
    m = String(label).match(/^(\w{3})\s+'(\d{2})$/);
    if (m) return `20${m[2]}-${String(MONTHS[m[1]]||1).padStart(2,'0')}-01`;
    return '2099-12-31';
  }

  let donutChart, splitChart, historyChart, sectorChart;
  let holdings = [];
  let sortCol = 4, sortAsc = false;
  let countdownSec = 300;
  let countdownInterval;
  let showBTC   = false;
  let hideDust  = false;
  let lastMergedHistory = [];
  const DUST_THRESHOLD = 1000;

  function toggleBTC() {
    showBTC = !showBTC;
    const btn = document.getElementById('btc-btn');
    btn.classList.toggle('active', showBTC);
    renderHistory(lastMergedHistory);
  }

  function toggleDust() {
    hideDust = !hideDust;
    const btn = document.getElementById('dust-btn');
    btn.classList.toggle('active', hideDust);
    btn.textContent = hideDust ? 'Show dust' : 'Hide dust';
    renderTable();
  }

  // ── Categories ──────────────────────────────────────────────
  const STABLES  = ['USDC','USDT','USDG','BUSD','USDS','DAI','FRAX','TUSD','LUSD'];
  const ILLIQUID = [];

  function getCategory(token) {
    const t = token.toUpperCase();
    if (STABLES.some(s => t === s || t.startsWith(s))) return 'stables';
    if (ILLIQUID.some(s => t.includes(s))) return 'illiquid';
    return 'crypto';
  }

  // ── Sector mapping (edit tokens here to reclassify) ─────────
  // Add or move tokens between sectors as the portfolio changes.
  const SECTOR_MAP = {
    AI:      ['TAO','SN44','RENDER','RNDR','FET','AKT','IO','GRASS','NEAR','WLD','OCEAN','NMR','AGIX','ALT','ARKM','PRIME','VIRTUAL','GFAL','ATH','CGPT'],
    DeFi:    ['HYPE','AAVE','UNI','LINK','DYDX','CRV','MKR','SNX','1INCH','COMP','BAL','SUSHI','GMX','PENDLE','LDO','JUP','JITO','ORCA','RAY','PYTH'],
    'L1/L2': ['BTC','ETH','SOL','JITOSOL','AVAX','MATIC','POL','ARB','OP','APT','SUI','TIA','ATOM','DOT','ADA','TON','INJ','SEI','KAVA','XRP','BNB'],
  };

  function getSector(token) {
    const t = token.toUpperCase();
    if (STABLES.some(s => t === s || t.startsWith(s))) return 'Stables';
    // Prefix match: "SN44 Tranche 2" matches "SN44", exact match for others
    for (const [sector, tokens] of Object.entries(SECTOR_MAP)) {
      if (tokens.some(s => t === s || t.startsWith(s + ' ') || t.startsWith(s + '_'))) return sector;
    }
    if (ILLIQUID.some(s => t.includes(s))) return 'Illiquid';
    return 'Other';
  }

  const SECTOR_COLORS = {
    'AI':      '#1a7a3a',
    'L1/L2':   '#555',
    'DeFi':    '#52c57a',
    'Stables': '#999',
    'Illiquid':'#d4a017',
    'Other':   '#ccc',
  };

  // ── Format helpers ───────────────────────────────────────────
  function fmtUSD(v) {
    if (v == null || isNaN(v)) return '<span class="null-val">—</span>';
    return '$' + Math.round(v).toLocaleString('en-US');
  }
  function fmtPrice(v) {
    if (v == null || isNaN(v) || v === 0) return '<span class="null-val">—</span>';
    if (v >= 10000) return '$' + Math.round(v).toLocaleString('en-US');
    if (v >= 1)     return '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return '$' + v.toPrecision(4);
  }
  function fmtPct(v) {
    if (v == null || isNaN(v)) return '<span class="null-val">—</span>';
    return (v * 100).toFixed(1) + '%';
  }
  function fmtK(v) {
    if (v >= 1e6) return '$' + (v / 1e6).toFixed(2) + 'M';
    if (v >= 1e3) return '$' + (v / 1e3).toFixed(0) + 'k';
    return '$' + Math.round(v);
  }

  // ── Fetch ────────────────────────────────────────────────────
  async function loadData() {
    try {
      const res  = await fetch(GVIZ_URL + '&_=' + Date.now());
      const text = await res.text();
      const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      process(json.table);
    } catch (e) {
      document.getElementById('table-container').innerHTML =
        `<div class="error">Failed to load: ${e.message}</div>`;
      document.getElementById('history-container').innerHTML = '';
    }
  }

  function cellVal(c) { return c ? c.v : null; }

  function process(table) {
    const rows = table.rows.map(r => r.c.map(cellVal));

    // TOTAL AUM
    const totRow = rows.find(r => r[0] === 'TOTAL AUM');
    if (totRow) {
      document.getElementById('total-aum').textContent    = totRow[4] != null ? '$' + Math.round(totRow[4]).toLocaleString() : '—';
      document.getElementById('personal-aum').textContent = totRow[2] != null ? '$' + Math.round(totRow[2]).toLocaleString() : '—';
      document.getElementById('pylon-aum').textContent    = totRow[3] != null ? '$' + Math.round(totRow[3]).toLocaleString() : '—';
    }

    // History rows
    const histIdx = rows.findIndex(r => r[0] === 'HISTORY');
    const histRows = histIdx !== -1
      ? rows.slice(histIdx + 1).filter(r => r[0] && r[1] != null)
      : [];

    // Holdings = before TOTAL AUM and HISTORY
    const cutoff = Math.min(
      rows.findIndex(r => r[0] === 'TOTAL AUM') >= 0 ? rows.findIndex(r => r[0] === 'TOTAL AUM') : rows.length,
      histIdx >= 0 ? histIdx : rows.length
    );
    holdings = rows.slice(0, cutoff).filter(r => r[0] && r[4] != null && r[4] > 0);

    // Merge hardcoded history with sheet history rows, deduplicate by label, sort by date
    // Format: [label, portfolioValue, isoDate, btcPrice]
    const hardcodedLabels = new Set(HARDCODED_HISTORY.map(h => h[0]));
    const sheetOnlyHist   = histRows
      .filter(r => !hardcodedLabels.has(r[0]))
      .map(r => {
        const iso = parseHistLabel(r[0]);
        return [r[0], r[1], iso, BTC_BY_DATE[iso] || null, HYPE_BY_DATE[iso] || null];
      });
    lastMergedHistory = [...HARDCODED_HISTORY, ...sheetOnlyHist]
      .sort((a, b) => a[2].localeCompare(b[2]));

    renderCategoryBar();
    renderTable();
    renderDonut();
    renderSplitBar();
    renderSectorDonut();
    renderHistory(lastMergedHistory);
  }

  // ── Category bar ─────────────────────────────────────────────
  function renderCategoryBar() {
    const totals = { crypto: 0, stables: 0, illiquid: 0 };
    holdings.forEach(r => { totals[getCategory(r[0])] += r[4] || 0; });
    const total = totals.crypto + totals.stables + totals.illiquid || 1;

    ['crypto','stables','illiquid'].forEach(cat => {
      const pct = (totals[cat] / total * 100).toFixed(1);
      document.getElementById(`seg-${cat}`).style.width = pct + '%';
      document.getElementById(`cat-${cat}-val`).textContent = fmtK(totals[cat]);
      document.getElementById(`cat-${cat}-pct`).textContent = `(${pct}%)`;
    });
  }

  // ── Holdings table ───────────────────────────────────────────
  function renderTable() {
    const visible = hideDust ? holdings.filter(r => (r[4] || 0) >= DUST_THRESHOLD) : holdings;
    const maxVal = Math.max(...visible.map(r => r[4] || 0));
    const sorted = [...visible].sort((a, b) => {
      const av = a[sortCol], bv = b[sortCol];
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      if (typeof av === 'string') return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortAsc ? av - bv : bv - av;
    });

    const cols = [
      { label: 'Token', idx: 0 },
      { label: 'Price',  idx: 1 },
      { label: 'Personal', idx: 2 },
      { label: 'Pylon',    idx: 3 },
      { label: 'Total',    idx: 4 },
      { label: 'Alloc',    idx: 5 },
    ];

    const arrow = i => sortCol !== i
      ? '<span class="sort-arrow">↕</span>'
      : `<span class="sort-arrow">${sortAsc ? '↑' : '↓'}</span>`;

    const catLabels = { crypto: 'Crypto', stables: 'Stable', illiquid: 'Illiquid' };
    const catColors = { crypto: '#1a7a3a', stables: '#999', illiquid: '#d4a017' };

    const thead = `<thead><tr>${cols.map(c =>
      `<th class="${sortCol === c.idx ? 'sorted' : ''}" onclick="sortTable(${c.idx})">${c.label}${arrow(c.idx)}</th>`
    ).join('')}</tr></thead>`;

    const tbody = `<tbody>${sorted.map(r => {
      const cat    = getCategory(r[0]);
      const barW   = Math.round((r[4] / maxVal) * 100);
      return `<tr>
        <td>
          <span class="tok-name">${r[0]}</span>
          <span class="tok-cat" style="color:${catColors[cat]}">${catLabels[cat]}</span>
        </td>
        <td>${fmtPrice(r[1])}</td>
        <td>${fmtUSD(r[2])}</td>
        <td>${fmtUSD(r[3])}</td>
        <td>${fmtUSD(r[4])}</td>
        <td class="alloc-cell pct-val">
          ${fmtPct(r[5])}
          <div class="alloc-bar" style="width:${barW}%"></div>
        </td>
      </tr>`;
    }).join('')}</tbody>`;

    document.getElementById('table-container').innerHTML = `<table>${thead}${tbody}</table>`;
  }

  function sortTable(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = false; }
    renderTable();
  }

  // ── Donut chart ──────────────────────────────────────────────
  const CAT_COLORS = { crypto: '#1a7a3a', stables: '#999', illiquid: '#d4a017' };
  const CRYPTO_SHADES = ['#1a7a3a','#2ea855','#52c57a','#85d9a3','#b4ecc7','#d0f5e0'];

  function renderDonut() {
    const cryptoHoldings = holdings.filter(r => getCategory(r[0]) === 'crypto' && r[4] > 1);
    const stablesTotal   = holdings.filter(r => getCategory(r[0]) === 'stables').reduce((s, r) => s + (r[4] || 0), 0);
    const illiquidTotal  = holdings.filter(r => getCategory(r[0]) === 'illiquid').reduce((s, r) => s + (r[4] || 0), 0);

    const labels = [
      ...cryptoHoldings.map(r => r[0]),
      ...(stablesTotal > 0 ? ['Stables'] : []),
      ...(illiquidTotal > 0 ? ['Illiquid'] : []),
    ];
    const values = [
      ...cryptoHoldings.map(r => r[4] || 0),
      ...(stablesTotal > 0 ? [stablesTotal] : []),
      ...(illiquidTotal > 0 ? [illiquidTotal] : []),
    ];
    const colors = [
      ...CRYPTO_SHADES.slice(0, cryptoHoldings.length),
      ...(stablesTotal > 0 ? ['#999'] : []),
      ...(illiquidTotal > 0 ? ['#d4a017'] : []),
    ];

    if (donutChart) donutChart.destroy();
    donutChart = new Chart(document.getElementById('donut-chart'), {
      type: 'doughnut',
      data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 1, borderColor: '#fff' }] },
      options: {
        responsive: false,
        cutout: '50%',
        plugins: {
          legend: {
            position: 'right',
            labels: { font: { family: 'Arial', size: 10 }, boxWidth: 8, padding: 6, color: '#333' }
          },
          tooltip: {
            callbacks: {
              label: ctx => {
                const total = values.reduce((s, v) => s + v, 0);
                return ` $${Math.round(ctx.raw).toLocaleString()}  (${(ctx.raw / total * 100).toFixed(1)}%)`;
              }
            }
          }
        }
      }
    });
  }

  // ── Personal vs Pylon stacked bar ───────────────────────────
  function renderSplitBar() {
    const data = holdings
      .filter(r => (r[2] > 0 || r[3] > 0))
      .sort((a, b) => ((b[2] || 0) + (b[3] || 0)) - ((a[2] || 0) + (a[3] || 0)));

    if (splitChart) splitChart.destroy();
    splitChart = new Chart(document.getElementById('split-chart'), {
      type: 'bar',
      data: {
        labels: data.map(r => r[0]),
        datasets: [
          {
            label: 'Personal',
            data: data.map(r => r[2] || 0),
            backgroundColor: '#1a7a3a',
            borderWidth: 0,
            barThickness: 11,
          },
          {
            label: 'Pylon',
            data: data.map(r => r[3] || 0),
            backgroundColor: '#555',
            borderWidth: 0,
            barThickness: 11,
          }
        ]
      },
      options: {
        responsive: false,
        indexAxis: 'y',
        plugins: {
          legend: {
            position: 'top',
            align: 'start',
            labels: { font: { family: 'Arial', size: 10 }, boxWidth: 8, padding: 10, color: '#333' }
          },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: $${Math.round(ctx.raw).toLocaleString()}`
            }
          }
        },
        scales: {
          x: {
            stacked: true,
            grid: { color: '#f2f2f2' },
            border: { display: false },
            ticks: {
              font: { family: 'Arial', size: 10 }, color: '#999',
              callback: v => v >= 1000 ? '$' + (v / 1000).toFixed(0) + 'k' : '$' + v
            }
          },
          y: {
            stacked: true,
            grid: { display: false },
            border: { display: false },
            ticks: { font: { family: 'Arial', size: 10 }, color: '#333' }
          }
        }
      }
    });
  }

  // ── Sector donut ─────────────────────────────────────────────
  function renderSectorDonut() {
    const totals = {};
    holdings.forEach(r => {
      const s = getSector(r[0]);
      totals[s] = (totals[s] || 0) + (r[4] || 0);
    });

    const grandTotal = Object.values(totals).reduce((s, v) => s + v, 0) || 1;
    const entries    = Object.entries(totals).filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]);
    const labels     = entries.map(([k]) => k);
    const values     = entries.map(([, v]) => v);
    const colors     = labels.map(l => SECTOR_COLORS[l] || '#ccc');

    if (sectorChart) sectorChart.destroy();
    sectorChart = new Chart(document.getElementById('sector-chart'), {
      type: 'doughnut',
      data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 1, borderColor: '#fff' }] },
      options: {
        responsive: false,
        cutout: '52%',
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ` $${Math.round(ctx.raw).toLocaleString()}  (${(ctx.raw / grandTotal * 100).toFixed(1)}%)`
            }
          }
        }
      }
    });

    // Breakdown table
    const aiEntry = entries.find(([k]) => k === 'AI');
    const aiPct   = aiEntry ? (aiEntry[1] / grandTotal * 100).toFixed(1) : '0.0';

    const rows = entries.map(([name, val]) => `
      <div class="sector-row">
        <div class="sector-dot" style="background:${SECTOR_COLORS[name] || '#ccc'}"></div>
        <span class="sector-name">${name}</span>
        <span class="sector-val">$${Math.round(val).toLocaleString()}</span>
        <span class="sector-pct">${(val / grandTotal * 100).toFixed(1)}%</span>
      </div>
    `).join('');

    document.getElementById('sector-breakdown').innerHTML =
      rows + `<p class="sector-note">AI allocation: ${aiPct}% of total portfolio. Edit SECTOR_MAP in the source to reclassify tokens.</p>`;
  }

  // ── History line chart ───────────────────────────────────────
  const crosshairPlugin = {
    id: 'crosshair',
    afterDraw(chart) {
      if (!chart.tooltip._active || !chart.tooltip._active.length) return;
      const ctx  = chart.ctx;
      const x    = chart.tooltip._active[0].element.x;
      const topY = chart.scales.y.top;
      const botY = chart.scales.y.bottom;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x, topY);
      ctx.lineTo(x, botY);
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(0,0,0,0.10)';
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.restore();
    }
  };

  // Draws event flags above the nearest data point
  const eventsPlugin = {
    id: 'events',
    afterDraw(chart) {
      if (!CHART_EVENTS.length) return;
      const ctx    = chart.ctx;
      const xScale = chart.scales.x;
      const yScale = chart.scales.y;
      const dates  = chart.data.datasets[0].__dates || [];

      CHART_EVENTS.forEach(ev => {
        // Find nearest data index by date
        let nearestIdx = 0, nearestDiff = Infinity;
        dates.forEach((d, i) => {
          const diff = Math.abs(new Date(d) - new Date(ev.date));
          if (diff < nearestDiff) { nearestDiff = diff; nearestIdx = i; }
        });

        const x   = xScale.getPixelForValue(nearestIdx);
        const topY = yScale.top;

        ctx.save();
        // Vertical dashed line
        ctx.beginPath();
        ctx.moveTo(x, topY + 18);
        ctx.lineTo(x, yScale.bottom);
        ctx.lineWidth = 1;
        ctx.strokeStyle = ev.color + '55';
        ctx.setLineDash([3, 3]);
        ctx.stroke();

        // Label pill
        ctx.font = 'bold 9px Arial';
        ctx.textAlign = 'center';
        const tw = ctx.measureText(ev.label).width + 12;
        const tx = Math.min(Math.max(x, tw / 2 + 4), chart.width - tw / 2 - 4);
        ctx.fillStyle = ev.color;
        ctx.beginPath();
        ctx.roundRect(tx - tw / 2, topY + 2, tw, 14, 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillText(ev.label, tx, topY + 12);
        ctx.restore();
      });
    }
  };

  function renderHistory(rows) {
    const container = document.getElementById('history-container');
    if (!rows || rows.length === 0) {
      container.innerHTML = '<div class="loading" style="color:#bbb">No history data yet.</div>';
      return;
    }

    container.innerHTML = '';
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'position:relative; height:320px; width:100%;';
    container.appendChild(wrapper);
    const canvas = document.createElement('canvas');
    wrapper.appendChild(canvas);

    const labels   = rows.map(r => r[0]);
    const isoDates = rows.map(r => r[2]);
    const values   = rows.map(r => r[1]);
    const btcRaw   = rows.map(r => r[3]);
    const hypeRaw  = rows.map(r => r[4]);

    // Index overlay lines to 100 at their first non-null value
    function indexTo100(vals) {
      const base = vals.find(v => v != null);
      return base ? vals.map(v => v != null ? Math.round(v / base * 1000) / 10 : null) : vals;
    }
    const btcIdx  = indexTo100(btcRaw);
    const hypeIdx = indexTo100(hypeRaw);

    const athIdx  = values.indexOf(Math.max(...values));
    const portMin = Math.min(...values) * 0.90;
    const portMax = Math.max(...values) * 1.06;
    const overlayNonNull = [...btcIdx, ...hypeIdx].filter(v => v != null);
    const overlayMin = overlayNonNull.length ? Math.min(...overlayNonNull) * 0.90 : 0;
    const overlayMax = overlayNonNull.length ? Math.max(...overlayNonNull) * 1.10 : 200;

    const pointRadius  = values.map((_, i) => i === athIdx ? 6 : 3.5);
    const pointBg      = values.map((_, i) => i === athIdx ? '#fff' : '#1a7a3a');
    const pointBorderW = values.map((_, i) => i === athIdx ? 2.5 : 0);

    const datasets = [
      {
        label: 'Portfolio',
        data: values,
        yAxisID: 'y',
        borderColor: '#1a7a3a',
        borderWidth: 2,
        pointBackgroundColor: pointBg,
        pointBorderColor: '#1a7a3a',
        pointBorderWidth: pointBorderW,
        pointRadius: pointRadius,
        pointHoverRadius: 7,
        pointHoverBackgroundColor: '#fff',
        pointHoverBorderColor: '#1a7a3a',
        pointHoverBorderWidth: 2,
        fill: true,
        backgroundColor: ctx => {
          const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 320);
          g.addColorStop(0, 'rgba(26,122,58,0.11)');
          g.addColorStop(1, 'rgba(26,122,58,0)');
          return g;
        },
        tension: 0.35,
        __dates: isoDates,
      }
    ];

    if (showBTC) {
      datasets.push({
        label: 'BTC (indexed)',
        data: btcIdx,
        yAxisID: 'yOverlay',
        borderColor: '#f7931a',
        borderWidth: 1.5,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: '#f7931a',
        fill: false,
        tension: 0.35,
        spanGaps: true,
      });
      datasets.push({
        label: 'HYPE (indexed)',
        data: hypeIdx,
        yAxisID: 'yOverlay',
        borderColor: '#6366f1',
        borderWidth: 1.5,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: '#6366f1',
        fill: false,
        tension: 0.35,
        spanGaps: true,
      });
    }

    const scales = {
      x: {
        grid: { display: false },
        border: { display: false },
        ticks: {
          font: { family: 'Arial', size: 11 },
          color: '#777',
          maxRotation: 35,
          minRotation: 0,
          autoSkip: true,
          maxTicksLimit: 14,
        }
      },
      y: {
        min: portMin,
        max: portMax,
        position: 'left',
        grid: { color: '#f0f0f0' },
        border: { display: false },
        ticks: {
          font: { family: 'Arial', size: 11 },
          color: '#aaa',
          maxTicksLimit: 6,
          callback: v => '$' + (v / 1000).toFixed(0) + 'k'
        }
      }
    };

    if (showBTC) {
      scales.yOverlay = {
        min: overlayMin,
        max: overlayMax,
        position: 'right',
        grid: { display: false },
        border: { display: false },
        ticks: {
          font: { family: 'Arial', size: 10 },
          color: '#aaa',
          maxTicksLimit: 5,
          callback: v => v.toFixed(0)
        },
        title: {
          display: true,
          text: 'Index (100 = start)',
          font: { family: 'Arial', size: 9 },
          color: '#bbb',
        }
      };
    }

    if (historyChart) historyChart.destroy();
    historyChart = new Chart(canvas, {
      type: 'line',
      plugins: [crosshairPlugin, eventsPlugin],
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            display: showBTC,
            position: 'top',
            align: 'end',
            labels: { font: { family: 'Arial', size: 10 }, boxWidth: 10, padding: 12, color: '#555' }
          },
          tooltip: {
            backgroundColor: '#fff',
            borderColor: '#e0e0e0',
            borderWidth: 1,
            titleColor: '#111',
            bodyColor: '#555',
            padding: 12,
            cornerRadius: 2,
            displayColors: showBTC,
            callbacks: {
              title: ctx => ctx[0].label,
              label: ctx => {
                const i    = ctx.dataIndex;
                const val  = ctx.raw;
                const prev = i > 0 ? ctx.dataset.data[i - 1] : null;
                if (val == null) return null;
                const lbl = ctx.dataset.label;
                const isOverlay = lbl.includes('indexed');
                if (isOverlay) {
                  const name = lbl.replace(' (indexed)', '');
                  const rawArr = name === 'BTC' ? btcRaw : hypeRaw;
                  const rawVal = rawArr[i];
                  const rawStr = rawVal != null
                    ? (rawVal >= 1000 ? '$' + Math.round(rawVal).toLocaleString() : '$' + rawVal.toFixed(2))
                    : '';
                  return ` ${name}  ${rawStr}  (${val.toFixed(1)})`;
                }
                const delta = prev != null ? ((val - prev) / prev * 100) : null;
                const lines = [` Portfolio  $${Math.round(val).toLocaleString()}`];
                if (delta != null) {
                  const sign = delta >= 0 ? '+' : '';
                  lines.push(`   ${sign}${delta.toFixed(1)}% vs prior`);
                }
                if (i === athIdx) lines.push('   All-time high');
                return lines;
              }
            }
          }
        },
        scales
      }
    });

    // Store dates reference on dataset for eventsPlugin
    historyChart.data.datasets[0].__dates = isoDates;
  }

  // ── Countdown + auto-refresh ─────────────────────────────────
  function startCountdown() {
    countdownSec = 300;
    clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
      countdownSec--;
      const m = Math.floor(countdownSec / 60);
      const s = String(countdownSec % 60).padStart(2, '0');
      document.getElementById('countdown').textContent = `${m}:${s}`;
      if (countdownSec <= 0) {
        loadData();
        loadCallOptions();
        startCountdown();
      }
    }, 1000);
  }

  function manualRefresh() {
    loadData();
    loadCallOptions();
    startCountdown();
  }

  // ── Call Options ─────────────────────────────────────────────
  const CALL_OPTIONS_GID = '496554439';
  const CALL_OPTIONS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${CALL_OPTIONS_GID}`;

  async function loadCallOptions() {
    try {
      const res  = await fetch(CALL_OPTIONS_URL + '&_=' + Date.now());
      const text = await res.text();
      const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      // Preserve both raw (v) and formatted (f) values
      const rows = json.table.rows.map(r => r.c.map(c => c
        ? { v: c.v, f: c.f !== null && c.f !== undefined ? c.f : c.v }
        : { v: null, f: null }
      ));

      const txIdx   = rows.findIndex(r => String(r[0].v).startsWith('TRANSACTIONS'));
      const options = rows
        .slice(0, txIdx > 0 ? txIdx : rows.length)
        .filter(r => r[0].v && !['TRANSACTIONS','Date','Month','Color Key:','TOTAL EXPECTED','EXPECTED TOKENS'].some(s => String(r[0].v).startsWith(s)));

      renderCallOptions(options);
    } catch (e) {
      document.getElementById('call-options-container').innerHTML =
        `<div class="error">Failed to load options: ${e.message}</div>`;
    }
  }

  function renderCallOptions(options) {
    if (!options || options.length === 0) {
      document.getElementById('call-options-container').innerHTML =
        '<div class="loading" style="color:#bbb">No option data found.</div>';
      return;
    }

    // Parse each option into a structured object
    const parsed = options.map(r => {
      const name      = r[0].f || '';
      const strikeFmt = r[1].f || '';
      const tokens    = r[3].f || '';
      const expiry    = r[4].f || '';
      const price     = r[5].f || '';
      const status    = r[6].f || '';
      const pct       = r[7].f || '';
      const rem       = r[8].f || '';
      const deliv     = r[9].f || '';
      const isITM     = status === 'ITM';
      const sc        = isITM ? 'opt-itm' : 'opt-otm';

      const strikeNum = parseFloat(String(r[1].v || '0').replace(/[^0-9.]/g, ''));
      const priceNum  = typeof r[5].v === 'number' ? r[5].v : 0;
      const remNum    = typeof r[8].v === 'number' ? r[8].v : 0;
      let curVal = '—', pnl = '—', pnlClass = '';
      if (strikeNum > 0 && remNum > 0) {
        const currentValNum = (remNum / strikeNum) * priceNum;
        const pnlNum        = currentValNum - remNum;
        curVal   = '$' + Math.round(currentValNum).toLocaleString();
        pnl      = (pnlNum >= 0 ? '+' : '') + '$' + Math.round(pnlNum).toLocaleString();
        pnlClass = pnlNum >= 0 ? 'opt-payoff-pos' : 'opt-payoff-neg';
      }
      return { name, strikeFmt, tokens, expiry, price, status, pct, rem, deliv, isITM, sc, curVal, pnl, pnlClass };
    });

    // Transposed table — metrics as rows, options as columns
    const colHeaders = parsed.map(o =>
      `<th class="${o.isITM ? 'opt-col-itm' : ''}">${o.name}</th>`
    ).join('');

    const row = (label, cells) =>
      `<tr><td>${label}</td>${cells}</tr>`;

    const cell = (val, cls = '') =>
      `<td${cls ? ` class="${cls}"` : ''}>${val}</td>`;

    const divider = `<tr class="opt-divider"><td colspan="${parsed.length + 1}"></td></tr>`;

    const tbody = [
      row('Strike Price',       parsed.map(o => cell(o.strikeFmt)).join('')),
      row('Current Price',      parsed.map(o => cell(o.price)).join('')),
      row('Status',             parsed.map(o => cell(o.status, o.sc)).join('')),
      row('vs Strike',          parsed.map(o => cell(o.pct, o.sc)).join('')),
      divider,
      row('Remaining Notional', parsed.map(o => cell(o.rem)).join('')),
      row('Current Value',      parsed.map(o => cell(o.curVal)).join('')),
      row('Unrealized P&L',     parsed.map(o => cell(o.pnl, o.pnlClass)).join('')),
      divider,
      row('Tokens if Exercised',parsed.map(o => cell(o.tokens)).join('')),
      row('Expiry',             parsed.map(o => cell(o.expiry)).join('')),
      row('Delivery',           parsed.map(o => `<td class="opt-delivery-cell">${o.deliv}</td>`).join('')),
    ].join('');

    document.getElementById('call-options-container').innerHTML = `
      <table class="options-table">
        <thead><tr><th></th>${colHeaders}</tr></thead>
        <tbody>${tbody}</tbody>
      </table>`;
  }

  // ── Boot ─────────────────────────────────────────────────────
  loadData();
  loadCallOptions();
  startCountdown();
</script>
</body>
</html>
