<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pylon Holdings</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #fff; color: #111; font-size: 13px; }

    /* ── HEADER ── */
    header {
      padding: 24px 32px 18px;
      border-bottom: 2px solid #111;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-left h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; margin-bottom: 12px; }
    .aum-strip { display: flex; gap: 28px; align-items: baseline; flex-wrap: wrap; }
    .aum-block {}
    .aum-value        { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; line-height: 1; }
    .aum-value.small  { font-size: 16px; font-weight: 600; }
    .aum-label        { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #999; margin-top: 3px; }
    .aum-div          { width: 1px; height: 28px; background: #e5e5e5; align-self: center; }

    .header-right { text-align: right; }
    .refresh-status { font-size: 11px; color: #999; margin-bottom: 6px; }
    .refresh-status span { color: #333; font-weight: 600; }
    .refresh-btn {
      background: none; border: 1px solid #ddd; padding: 4px 14px;
      font-size: 11px; font-family: Arial; cursor: pointer; color: #666;
    }
    .refresh-btn:hover { border-color: #111; color: #111; }

    /* ── CATEGORY BAR ── */
    .cat-bar-section {
      padding: 14px 32px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .cat-bar-track {
      flex: 1;
      min-width: 200px;
      height: 8px;
      background: #f0f0f0;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
    }
    .cat-bar-seg { height: 100%; transition: width 0.4s ease; }
    .cat-legend { display: flex; gap: 18px; flex-wrap: wrap; }
    .cat-item { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .cat-name { font-size: 11px; color: #555; }
    .cat-val  { font-size: 11px; font-weight: 700; color: #111; margin-left: 2px; }
    .cat-pct  { font-size: 10px; color: #999; }

    /* ── MAIN GRID ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 360px;
    }

    /* ── TABLE SECTION ── */
    .table-section { padding: 20px 32px 32px; border-right: 1px solid #e5e5e5; }
    .section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.9px; color: #999; margin-bottom: 12px;
    }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: #999; padding: 0 8px 10px 0;
      border-bottom: 1px solid #ddd; text-align: right; cursor: pointer;
      user-select: none; white-space: nowrap;
    }
    thead th:first-child { text-align: left; padding-left: 0; }
    thead th:hover, thead th.sorted { color: #111; }
    .sort-arrow { margin-left: 2px; opacity: 0.4; }
    thead th.sorted .sort-arrow { opacity: 1; }

    tbody td {
      padding: 10px 8px 10px 0; border-bottom: 1px solid #f2f2f2;
      text-align: right; font-variant-numeric: tabular-nums; vertical-align: middle;
    }
    tbody td:first-child { text-align: left; padding-left: 0; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafafa; }
    .tok-name { font-weight: 600; }
    .tok-cat  { font-size: 10px; color: #999; font-weight: 400; margin-left: 5px; }
    .null-val { color: #ccc; }
    .pct-val  { color: #555; }
    .alloc-cell { position: relative; }
    .alloc-bar  {
      position: absolute; bottom: 0; right: 0;
      height: 2px; background: #1a7a3a; border-radius: 1px;
    }

    /* ── RIGHT PANEL ── */
    .right-panel { padding: 20px 24px 32px; display: flex; flex-direction: column; gap: 28px; }
    .chart-block {}
    .chart-block canvas { display: block; }

    /* ── HISTORY SECTION ── */
    .history-section {
      padding: 20px 32px 32px;
      border-top: 1px solid #e5e5e5;
    }
    .history-note { font-size: 11px; color: #bbb; margin-top: 8px; font-style: italic; }

    /* ── LOADING / ERROR ── */
    .loading { color: #999; font-size: 12px; padding: 20px 0; }
    .error   { color: #c0392b; font-size: 12px; padding: 12px 0; }

    /* ── MOBILE ── */
    @media (max-width: 760px) {
      header { padding: 18px 18px 14px; }
      .cat-bar-section { padding: 12px 18px; }

      .main-grid { grid-template-columns: 1fr; }
      .table-section { padding: 18px 18px 24px; border-right: none; border-bottom: 1px solid #e5e5e5; }
      .right-panel { padding: 18px 18px 24px; flex-direction: row; flex-wrap: wrap; gap: 18px; }
      .right-panel .chart-block { flex: 1 1 280px; min-width: 0; }
      .right-panel canvas { width: 100% !important; height: auto !important; }
      .history-section { padding: 18px 18px 24px; }
      .aum-value { font-size: 22px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <h1>Pylon Holdings</h1>
    <div class="aum-strip">
      <div class="aum-block">
        <div class="aum-value" id="total-aum">—</div>
        <div class="aum-label">Total AUM</div>
      </div>
      <div class="aum-div"></div>
      <div class="aum-block">
        <div class="aum-value small" id="personal-aum">—</div>
        <div class="aum-label">Personal</div>
      </div>
      <div class="aum-block">
        <div class="aum-value small" id="pylon-aum">—</div>
        <div class="aum-label">Pylon</div>
      </div>
    </div>
  </div>
  <div class="header-right">
    <div class="refresh-status">Refreshes in <span id="countdown">5:00</span></div>
    <button class="refresh-btn" onclick="manualRefresh()">Refresh now</button>
  </div>
</header>

<!-- CATEGORY BAR -->
<div class="cat-bar-section">
  <div class="cat-bar-track" id="cat-bar">
    <div class="cat-bar-seg" id="seg-crypto" style="background:#1a7a3a; width:0%"></div>
    <div class="cat-bar-seg" id="seg-stables" style="background:#999; width:0%"></div>
    <div class="cat-bar-seg" id="seg-illiquid" style="background:#d4a017; width:0%"></div>
  </div>
  <div class="cat-legend" id="cat-legend">
    <div class="cat-item">
      <div class="cat-dot" style="background:#1a7a3a"></div>
      <span class="cat-name">Crypto</span>
      <span class="cat-val" id="cat-crypto-val">—</span>
      <span class="cat-pct" id="cat-crypto-pct"></span>
    </div>
    <div class="cat-item">
      <div class="cat-dot" style="background:#999"></div>
      <span class="cat-name">Stables</span>
      <span class="cat-val" id="cat-stables-val">—</span>
      <span class="cat-pct" id="cat-stables-pct"></span>
    </div>
    <div class="cat-item">
      <div class="cat-dot" style="background:#d4a017"></div>
      <span class="cat-name">Illiquid</span>
      <span class="cat-val" id="cat-illiquid-val">—</span>
      <span class="cat-pct" id="cat-illiquid-pct"></span>
    </div>
  </div>
</div>

<!-- MAIN GRID -->
<div class="main-grid">

  <!-- Holdings table -->
  <div class="table-section">
    <div class="section-label">Holdings</div>
    <div id="table-container"><div class="loading">Loading...</div></div>
  </div>

  <!-- Right charts -->
  <div class="right-panel">
    <div class="chart-block">
      <div class="section-label">Allocation</div>
      <canvas id="donut-chart" width="312" height="220"></canvas>
    </div>
    <div class="chart-block">
      <div class="section-label">Personal vs Pylon</div>
      <canvas id="split-chart" width="312" height="280"></canvas>
    </div>
  </div>

</div>

<!-- HISTORY LINE -->
<div class="history-section">
  <div class="section-label">Portfolio Value Over Time</div>
  <div id="history-container"><div class="loading">Loading...</div></div>
</div>

<script>
  const SHEET_ID   = '1CzdYeJkbu33l7jd0k8zBU63_QzYAAY_wIuM3r69ZpYQ';
  const SHEET_NAME = 'Consolidated';
  const GVIZ_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
  const REFRESH_MS = 5 * 60 * 1000;

  let donutChart, splitChart, historyChart;
  let holdings = [];
  let sortCol = 4, sortAsc = false;
  let countdownSec = 300;
  let countdownInterval;

  // ── Categories ──────────────────────────────────────────────
  const STABLES  = ['USDC','USDT','USDG','BUSD','USDS','DAI','FRAX','TUSD','LUSD'];
  const ILLIQUID = ['SN44'];

  function getCategory(token) {
    const t = token.toUpperCase();
    if (STABLES.some(s => t === s || t.startsWith(s))) return 'stables';
    if (ILLIQUID.some(s => t.includes(s))) return 'illiquid';
    return 'crypto';
  }

  // ── Format helpers ───────────────────────────────────────────
  function fmtUSD(v) {
    if (v == null || isNaN(v)) return '<span class="null-val">—</span>';
    return '$' + Math.round(v).toLocaleString('en-US');
  }
  function fmtPrice(v) {
    if (v == null || isNaN(v) || v === 0) return '<span class="null-val">—</span>';
    if (v >= 10000) return '$' + Math.round(v).toLocaleString('en-US');
    if (v >= 1)     return '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return '$' + v.toPrecision(4);
  }
  function fmtPct(v) {
    if (v == null || isNaN(v)) return '<span class="null-val">—</span>';
    return (v * 100).toFixed(1) + '%';
  }
  function fmtK(v) {
    if (v >= 1e6) return '$' + (v / 1e6).toFixed(2) + 'M';
    if (v >= 1e3) return '$' + (v / 1e3).toFixed(0) + 'k';
    return '$' + Math.round(v);
  }

  // ── Fetch ────────────────────────────────────────────────────
  async function loadData() {
    try {
      const res  = await fetch(GVIZ_URL + '&_=' + Date.now());
      const text = await res.text();
      const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      process(json.table);
    } catch (e) {
      document.getElementById('table-container').innerHTML =
        `<div class="error">Failed to load: ${e.message}</div>`;
      document.getElementById('history-container').innerHTML = '';
    }
  }

  function cellVal(c) { return c ? c.v : null; }

  function process(table) {
    const rows = table.rows.map(r => r.c.map(cellVal));

    // TOTAL AUM
    const totRow = rows.find(r => r[0] === 'TOTAL AUM');
    if (totRow) {
      document.getElementById('total-aum').textContent    = totRow[4] != null ? '$' + Math.round(totRow[4]).toLocaleString() : '—';
      document.getElementById('personal-aum').textContent = totRow[2] != null ? '$' + Math.round(totRow[2]).toLocaleString() : '—';
      document.getElementById('pylon-aum').textContent    = totRow[3] != null ? '$' + Math.round(totRow[3]).toLocaleString() : '—';
    }

    // History rows
    const histIdx = rows.findIndex(r => r[0] === 'HISTORY');
    const histRows = histIdx !== -1
      ? rows.slice(histIdx + 1).filter(r => r[0] && r[1] != null)
      : [];

    // Holdings = before TOTAL AUM and HISTORY
    const cutoff = Math.min(
      rows.findIndex(r => r[0] === 'TOTAL AUM') >= 0 ? rows.findIndex(r => r[0] === 'TOTAL AUM') : rows.length,
      histIdx >= 0 ? histIdx : rows.length
    );
    holdings = rows.slice(0, cutoff).filter(r => r[0] && r[4] != null && r[4] > 0);

    renderCategoryBar();
    renderTable();
    renderDonut();
    renderSplitBar();
    renderHistory(histRows);
  }

  // ── Category bar ─────────────────────────────────────────────
  function renderCategoryBar() {
    const totals = { crypto: 0, stables: 0, illiquid: 0 };
    holdings.forEach(r => { totals[getCategory(r[0])] += r[4] || 0; });
    const total = totals.crypto + totals.stables + totals.illiquid || 1;

    ['crypto','stables','illiquid'].forEach(cat => {
      const pct = (totals[cat] / total * 100).toFixed(1);
      document.getElementById(`seg-${cat}`).style.width = pct + '%';
      document.getElementById(`cat-${cat}-val`).textContent = fmtK(totals[cat]);
      document.getElementById(`cat-${cat}-pct`).textContent = `(${pct}%)`;
    });
  }

  // ── Holdings table ───────────────────────────────────────────
  function renderTable() {
    const maxVal = Math.max(...holdings.map(r => r[4] || 0));
    const sorted = [...holdings].sort((a, b) => {
      const av = a[sortCol], bv = b[sortCol];
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      if (typeof av === 'string') return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortAsc ? av - bv : bv - av;
    });

    const cols = [
      { label: 'Token', idx: 0 },
      { label: 'Price',  idx: 1 },
      { label: 'Personal', idx: 2 },
      { label: 'Pylon',    idx: 3 },
      { label: 'Total',    idx: 4 },
      { label: 'Alloc',    idx: 5 },
    ];

    const arrow = i => sortCol !== i
      ? '<span class="sort-arrow">↕</span>'
      : `<span class="sort-arrow">${sortAsc ? '↑' : '↓'}</span>`;

    const catLabels = { crypto: 'Crypto', stables: 'Stable', illiquid: 'Illiquid' };
    const catColors = { crypto: '#1a7a3a', stables: '#999', illiquid: '#d4a017' };

    const thead = `<thead><tr>${cols.map(c =>
      `<th class="${sortCol === c.idx ? 'sorted' : ''}" onclick="sortTable(${c.idx})">${c.label}${arrow(c.idx)}</th>`
    ).join('')}</tr></thead>`;

    const tbody = `<tbody>${sorted.map(r => {
      const cat    = getCategory(r[0]);
      const barW   = Math.round((r[4] / maxVal) * 100);
      return `<tr>
        <td>
          <span class="tok-name">${r[0]}</span>
          <span class="tok-cat" style="color:${catColors[cat]}">${catLabels[cat]}</span>
        </td>
        <td>${fmtPrice(r[1])}</td>
        <td>${fmtUSD(r[2])}</td>
        <td>${fmtUSD(r[3])}</td>
        <td>${fmtUSD(r[4])}</td>
        <td class="alloc-cell pct-val">
          ${fmtPct(r[5])}
          <div class="alloc-bar" style="width:${barW}%"></div>
        </td>
      </tr>`;
    }).join('')}</tbody>`;

    document.getElementById('table-container').innerHTML = `<table>${thead}${tbody}</table>`;
  }

  function sortTable(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = false; }
    renderTable();
  }

  // ── Donut chart ──────────────────────────────────────────────
  const CAT_COLORS = { crypto: '#1a7a3a', stables: '#999', illiquid: '#d4a017' };
  const CRYPTO_SHADES = ['#1a7a3a','#2ea855','#52c57a','#85d9a3','#b4ecc7','#d0f5e0'];

  function renderDonut() {
    const cryptoHoldings = holdings.filter(r => getCategory(r[0]) === 'crypto' && r[4] > 1);
    const stablesTotal   = holdings.filter(r => getCategory(r[0]) === 'stables').reduce((s, r) => s + (r[4] || 0), 0);
    const illiquidTotal  = holdings.filter(r => getCategory(r[0]) === 'illiquid').reduce((s, r) => s + (r[4] || 0), 0);

    const labels = [
      ...cryptoHoldings.map(r => r[0]),
      ...(stablesTotal > 0 ? ['Stables'] : []),
      ...(illiquidTotal > 0 ? ['Illiquid'] : []),
    ];
    const values = [
      ...cryptoHoldings.map(r => r[4] || 0),
      ...(stablesTotal > 0 ? [stablesTotal] : []),
      ...(illiquidTotal > 0 ? [illiquidTotal] : []),
    ];
    const colors = [
      ...CRYPTO_SHADES.slice(0, cryptoHoldings.length),
      ...(stablesTotal > 0 ? ['#999'] : []),
      ...(illiquidTotal > 0 ? ['#d4a017'] : []),
    ];

    if (donutChart) donutChart.destroy();
    donutChart = new Chart(document.getElementById('donut-chart'), {
      type: 'doughnut',
      data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 1, borderColor: '#fff' }] },
      options: {
        responsive: false,
        cutout: '50%',
        plugins: {
          legend: {
            position: 'right',
            labels: { font: { family: 'Arial', size: 10 }, boxWidth: 8, padding: 6, color: '#333' }
          },
          tooltip: {
            callbacks: {
              label: ctx => {
                const total = values.reduce((s, v) => s + v, 0);
                return ` $${Math.round(ctx.raw).toLocaleString()}  (${(ctx.raw / total * 100).toFixed(1)}%)`;
              }
            }
          }
        }
      }
    });
  }

  // ── Personal vs Pylon stacked bar ───────────────────────────
  function renderSplitBar() {
    const data = holdings
      .filter(r => (r[2] > 0 || r[3] > 0))
      .sort((a, b) => ((b[2] || 0) + (b[3] || 0)) - ((a[2] || 0) + (a[3] || 0)));

    if (splitChart) splitChart.destroy();
    splitChart = new Chart(document.getElementById('split-chart'), {
      type: 'bar',
      data: {
        labels: data.map(r => r[0]),
        datasets: [
          {
            label: 'Personal',
            data: data.map(r => r[2] || 0),
            backgroundColor: '#1a7a3a',
            borderWidth: 0,
            barThickness: 11,
          },
          {
            label: 'Pylon',
            data: data.map(r => r[3] || 0),
            backgroundColor: '#555',
            borderWidth: 0,
            barThickness: 11,
          }
        ]
      },
      options: {
        responsive: false,
        indexAxis: 'y',
        plugins: {
          legend: {
            position: 'top',
            align: 'start',
            labels: { font: { family: 'Arial', size: 10 }, boxWidth: 8, padding: 10, color: '#333' }
          },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: $${Math.round(ctx.raw).toLocaleString()}`
            }
          }
        },
        scales: {
          x: {
            stacked: true,
            grid: { color: '#f2f2f2' },
            border: { display: false },
            ticks: {
              font: { family: 'Arial', size: 10 }, color: '#999',
              callback: v => v >= 1000 ? '$' + (v / 1000).toFixed(0) + 'k' : '$' + v
            }
          },
          y: {
            stacked: true,
            grid: { display: false },
            border: { display: false },
            ticks: { font: { family: 'Arial', size: 10 }, color: '#333' }
          }
        }
      }
    });
  }

  // ── History line chart ───────────────────────────────────────
  function renderHistory(histRows) {
    const container = document.getElementById('history-container');

    if (histRows.length === 0) {
      container.innerHTML = '<div class="loading" style="color:#bbb">No history data yet.</div>';
      return;
    }

    container.innerHTML = '';
    const canvas = document.createElement('canvas');
    canvas.width  = Math.min(window.innerWidth - 64, 1100);
    canvas.height = 180;
    container.appendChild(canvas);

    if (histRows.length === 1) {
      container.insertAdjacentHTML('beforeend',
        '<div class="history-note">Add weekly snapshots to the HISTORY section of the sheet to build a performance chart.</div>');
    }

    const labels = histRows.map(r => r[0]);
    const values = histRows.map(r => r[1]);
    const minVal = Math.min(...values) * 0.97;
    const maxVal = Math.max(...values) * 1.03;

    if (historyChart) historyChart.destroy();
    historyChart = new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: values,
          borderColor: '#1a7a3a',
          borderWidth: 2,
          pointBackgroundColor: '#1a7a3a',
          pointRadius: histRows.length === 1 ? 5 : 3,
          pointHoverRadius: 6,
          fill: true,
          backgroundColor: (ctx) => {
            const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 180);
            g.addColorStop(0, 'rgba(26,122,58,0.12)');
            g.addColorStop(1, 'rgba(26,122,58,0)');
            return g;
          },
          tension: 0.3,
        }]
      },
      options: {
        responsive: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ` $${Math.round(ctx.raw).toLocaleString()}`
            }
          }
        },
        scales: {
          x: {
            grid: { display: false },
            border: { display: false },
            ticks: { font: { family: 'Arial', size: 11 }, color: '#666' }
          },
          y: {
            min: minVal,
            max: maxVal,
            grid: { color: '#f2f2f2' },
            border: { display: false },
            ticks: {
              font: { family: 'Arial', size: 10 }, color: '#999',
              callback: v => '$' + (v / 1000).toFixed(0) + 'k'
            }
          }
        }
      }
    });
  }

  // ── Countdown + auto-refresh ─────────────────────────────────
  function startCountdown() {
    countdownSec = 300;
    clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
      countdownSec--;
      const m = Math.floor(countdownSec / 60);
      const s = String(countdownSec % 60).padStart(2, '0');
      document.getElementById('countdown').textContent = `${m}:${s}`;
      if (countdownSec <= 0) {
        loadData();
        startCountdown();
      }
    }, 1000);
  }

  function manualRefresh() {
    loadData();
    startCountdown();
  }

  // ── Boot ─────────────────────────────────────────────────────
  loadData();
  startCountdown();
</script>
</body>
</html>
