<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pylon Holdings</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #fff; color: #111; font-size: 13px; min-height: 100vh; }

    /* ── Header ── */
    header {
      padding: 28px 36px 20px;
      border-bottom: 2px solid #111;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.2px; margin-bottom: 14px; }
    .aum-strip { display: flex; gap: 36px; align-items: baseline; }
    .aum-block {}
    .aum-value { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; line-height: 1; }
    .aum-value.sub { font-size: 17px; font-weight: 600; }
    .aum-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #999; margin-top: 4px; }
    .aum-divider { width: 1px; height: 32px; background: #e5e5e5; align-self: center; }
    .header-meta { font-size: 11px; color: #999; text-align: right; line-height: 1.6; }
    .refresh-btn {
      margin-top: 6px;
      background: none;
      border: 1px solid #ddd;
      padding: 4px 12px;
      font-size: 11px;
      font-family: Arial;
      cursor: pointer;
      color: #666;
      display: block;
      margin-left: auto;
    }
    .refresh-btn:hover { border-color: #111; color: #111; }

    /* ── Layout ── */
    .main {
      display: grid;
      grid-template-columns: 1fr 380px;
      min-height: calc(100vh - 140px);
    }
    .table-section { padding: 24px 36px 36px; border-right: 1px solid #e5e5e5; }
    .charts-section { padding: 24px 28px 36px; }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: #999;
      margin-bottom: 14px;
    }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #999;
      padding: 0 10px 10px 0;
      border-bottom: 1px solid #ddd;
      text-align: right;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    thead th:first-child { text-align: left; }
    thead th:hover { color: #111; }
    thead th.sorted { color: #111; }
    thead th .sort-arrow { margin-left: 3px; opacity: 0.5; }
    thead th.sorted .sort-arrow { opacity: 1; }

    tbody td {
      padding: 11px 10px 11px 0;
      border-bottom: 1px solid #f2f2f2;
      text-align: right;
      font-variant-numeric: tabular-nums;
      vertical-align: middle;
    }
    tbody td:first-child { text-align: left; font-weight: 600; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafafa; }

    .null-val { color: #ccc; }
    .pct-val { color: #555; }

    /* allocation bar inside % cell */
    .alloc-cell { position: relative; min-width: 70px; }
    .alloc-bar {
      position: absolute;
      bottom: 0;
      right: 0;
      height: 2px;
      background: #1a7a3a;
      border-radius: 1px;
    }

    /* ── Charts ── */
    .chart-block { margin-bottom: 28px; }
    .chart-block canvas { display: block; }

    /* ── Loading state ── */
    .loading { color: #999; font-size: 12px; padding: 24px 0; }
    .error { color: #c0392b; font-size: 12px; padding: 12px 0; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Pylon Holdings</h1>
    <div class="aum-strip">
      <div class="aum-block">
        <div class="aum-value" id="total-aum">—</div>
        <div class="aum-label">Total AUM</div>
      </div>
      <div class="aum-divider"></div>
      <div class="aum-block">
        <div class="aum-value sub" id="personal-aum">—</div>
        <div class="aum-label">Personal</div>
      </div>
      <div class="aum-block">
        <div class="aum-value sub" id="pylon-aum">—</div>
        <div class="aum-label">Pylon</div>
      </div>
    </div>
  </div>
  <div class="header-meta">
    <span id="snapshot-label">—</span>
    <button class="refresh-btn" onclick="loadData()">Refresh</button>
  </div>
</header>

<div class="main">
  <!-- Holdings table -->
  <div class="table-section">
    <div class="section-label">Holdings</div>
    <div id="table-container">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-section">
    <div class="chart-block">
      <div class="section-label">Allocation</div>
      <canvas id="pie-chart" width="324" height="240"></canvas>
    </div>
    <div class="chart-block">
      <div class="section-label">Value by Position</div>
      <canvas id="bar-chart" width="324" height="260"></canvas>
    </div>
  </div>
</div>

<script>
  const SHEET_ID   = '1CzdYeJkbu33l7jd0k8zBU63_QzYAAY_wIuM3r69ZpYQ';
  const SHEET_NAME = 'Consolidated';
  const URL        = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

  let pieChart, barChart;
  let holdings = [];
  let sortCol  = 4;   // default: Total Value
  let sortAsc  = false;

  // ── Format helpers ──────────────────────────────────────────
  function fmtUSD(v, compact) {
    if (v == null || isNaN(v)) return '<span class="null-val">—</span>';
    if (compact) {
      if (v >= 1e6) return '$' + (v / 1e6).toFixed(2) + 'M';
      if (v >= 1e3) return '$' + (v / 1e3).toFixed(1) + 'k';
    }
    return '$' + Math.round(v).toLocaleString('en-US');
  }

  function fmtPrice(v) {
    if (v == null || isNaN(v)) return '<span class="null-val">—</span>';
    if (v === 0) return '<span class="null-val">—</span>';
    if (v >= 10000) return '$' + Math.round(v).toLocaleString('en-US');
    if (v >= 1)    return '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return '$' + v.toPrecision(4);
  }

  function fmtPct(v) {
    if (v == null || isNaN(v)) return '<span class="null-val">—</span>';
    return (v * 100).toFixed(1) + '%';
  }

  // ── Fetch + parse ────────────────────────────────────────────
  async function loadData() {
    document.getElementById('table-container').innerHTML = '<div class="loading">Loading...</div>';
    try {
      const res  = await fetch(URL);
      const text = await res.text();
      const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      process(json.table);
    } catch (e) {
      document.getElementById('table-container').innerHTML =
        `<div class="error">Failed to load data. Make sure the sheet is publicly shared.<br>${e.message}</div>`;
    }
  }

  function cellVal(c) { return c ? c.v : null; }

  function process(table) {
    const rows = table.rows.map(r => r.c.map(cellVal));

    // TOTAL AUM row
    const totRow = rows.find(r => r[0] === 'TOTAL AUM');
    if (totRow) {
      document.getElementById('total-aum').textContent  = totRow[4] != null ? '$' + Math.round(totRow[4]).toLocaleString() : '—';
      document.getElementById('personal-aum').textContent = totRow[2] != null ? '$' + Math.round(totRow[2]).toLocaleString() : '—';
      document.getElementById('pylon-aum').textContent    = totRow[3] != null ? '$' + Math.round(totRow[3]).toLocaleString() : '—';
    }

    // History snapshot
    const histIdx = rows.findIndex(r => r[0] === 'HISTORY');
    if (histIdx !== -1) {
      const snap = rows[histIdx + 1];
      if (snap && snap[0]) {
        const snapVal = snap[1] != null ? '  |  $' + Math.round(snap[1]).toLocaleString() : '';
        document.getElementById('snapshot-label').textContent = `Snapshot: ${snap[0]}${snapVal}`;
      }
    }

    // Holdings = rows before TOTAL AUM and HISTORY
    const cutoff = Math.min(
      histIdx !== -1 ? histIdx : rows.length,
      rows.findIndex(r => r[0] === 'TOTAL AUM') !== -1 ? rows.findIndex(r => r[0] === 'TOTAL AUM') : rows.length
    );
    holdings = rows.slice(0, cutoff).filter(r => r[0] && r[4] != null && r[4] > 0);

    renderTable();
    renderCharts();
  }

  // ── Table ────────────────────────────────────────────────────
  function renderTable() {
    const maxVal = Math.max(...holdings.map(r => r[4] || 0));

    const sorted = [...holdings].sort((a, b) => {
      const av = a[sortCol], bv = b[sortCol];
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      if (typeof av === 'string') return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortAsc ? av - bv : bv - av;
    });

    const cols = [
      { label: 'Token',       idx: 0 },
      { label: 'Price',       idx: 1 },
      { label: 'Personal',    idx: 2 },
      { label: 'Pylon',       idx: 3 },
      { label: 'Total Value', idx: 4 },
      { label: 'Alloc',       idx: 5 },
    ];

    const arrow = (idx) => {
      if (sortCol !== idx) return '<span class="sort-arrow">↕</span>';
      return `<span class="sort-arrow">${sortAsc ? '↑' : '↓'}</span>`;
    };

    const thead = `<thead><tr>${cols.map(c =>
      `<th class="${sortCol === c.idx ? 'sorted' : ''}" onclick="sort(${c.idx})">${c.label}${arrow(c.idx)}</th>`
    ).join('')}</tr></thead>`;

    const tbody = `<tbody>${sorted.map(r => {
      const pct   = r[5] != null ? r[5] : 0;
      const barW  = Math.round((r[4] / maxVal) * 100);
      return `<tr>
        <td>${r[0]}</td>
        <td>${fmtPrice(r[1])}</td>
        <td>${fmtUSD(r[2])}</td>
        <td>${fmtUSD(r[3])}</td>
        <td>${fmtUSD(r[4])}</td>
        <td class="alloc-cell pct-val">
          ${fmtPct(r[5])}
          <div class="alloc-bar" style="width:${barW}%"></div>
        </td>
      </tr>`;
    }).join('')}</tbody>`;

    document.getElementById('table-container').innerHTML =
      `<table>${thead}${tbody}</table>`;
  }

  function sort(col) {
    if (sortCol === col) { sortAsc = !sortAsc; }
    else { sortCol = col; sortAsc = false; }
    renderTable();
  }

  // ── Charts ───────────────────────────────────────────────────
  const PALETTE = [
    '#1a7a3a','#2ea855','#52c57a','#85d9a3','#b4ecc7',
    '#999','#bbb','#c0392b','#e05a4a','#d4a017','#e8c567','#f0dda0'
  ];

  function renderCharts() {
    const data = [...holdings]
      .filter(r => r[4] > 1)
      .sort((a, b) => (b[4] || 0) - (a[4] || 0));

    const labels = data.map(r => r[0]);
    const values = data.map(r => r[4] || 0);
    const colors = PALETTE.slice(0, data.length);

    // Doughnut
    if (pieChart) pieChart.destroy();
    pieChart = new Chart(document.getElementById('pie-chart'), {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{ data: values, backgroundColor: colors, borderWidth: 1, borderColor: '#fff' }]
      },
      options: {
        responsive: false,
        cutout: '52%',
        plugins: {
          legend: {
            position: 'right',
            labels: {
              font: { family: 'Arial', size: 10 },
              boxWidth: 9,
              padding: 7,
              color: '#333'
            }
          },
          tooltip: {
            callbacks: {
              label: ctx => {
                const total = values.reduce((s, v) => s + v, 0);
                const pct   = ((ctx.raw / total) * 100).toFixed(1);
                return ` $${Math.round(ctx.raw).toLocaleString()}  (${pct}%)`;
              }
            }
          }
        }
      }
    });

    // Horizontal bar
    if (barChart) barChart.destroy();
    barChart = new Chart(document.getElementById('bar-chart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: colors,
          borderWidth: 0,
          barThickness: 13
        }]
      },
      options: {
        responsive: false,
        indexAxis: 'y',
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ` $${Math.round(ctx.raw).toLocaleString()}`
            }
          }
        },
        scales: {
          x: {
            grid: { color: '#f2f2f2' },
            border: { display: false },
            ticks: {
              font: { family: 'Arial', size: 10 },
              color: '#999',
              callback: v => v >= 1000 ? '$' + (v / 1000).toFixed(0) + 'k' : '$' + v
            }
          },
          y: {
            grid: { display: false },
            border: { display: false },
            ticks: { font: { family: 'Arial', size: 11 }, color: '#333' }
          }
        }
      }
    });
  }

  // ── Boot ─────────────────────────────────────────────────────
  loadData();
</script>
</body>
</html>
